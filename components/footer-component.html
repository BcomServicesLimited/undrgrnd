<!--
  UNDRGRND Movement — Footer Component
  File: /components/footer-component.html

  Usage: Copy this entire block into any page <body>, as the last element before </body>.
  Dependencies:
    - /css/global.css (must be loaded in <head>)
    - site-config.json (footer data loaded via fetch in <script> below)

  Data sources:
    - project.tagline
    - business.legal_name, business.address, business.contact, business.hours
    - navigation.main_menu

  NAP CONSISTENCY: Name, Address, Phone are rendered directly from
  site-config.json to ensure exact match with Google My Business.
-->

<!-- =====================================================================
     FOOTER STYLES (scoped to this component)
     ===================================================================== -->
<style>
  /* --- Footer wrapper --- */
  .site-footer {
    background-color: #1A1A1A;               /* site-config: design.colors.card_bg */
    border-top: 3px solid;
    border-image: linear-gradient(135deg, #8B5CF6 0%, #EC4899 100%) 1; /* site-config: gradient_purple */
    color: #FFFFFF;                           /* site-config: design.colors.text_white */
    font-family: 'Outfit', Helvetica Neue, sans-serif; /* site-config: design.fonts.body */
    margin-top: auto;
  }

  /* --- Main footer grid --- */
  .footer-main {
    max-width: 1400px;
    margin-inline: auto;
    padding: 5rem 5% 3rem;
    display: grid;
    grid-template-columns: 1fr;
    gap: 3rem;
  }

  /* Tablet: 2 columns */
  @media (min-width: 768px) {
    .footer-main {
      grid-template-columns: 1fr 1fr;
      gap: 3rem 4rem;
    }
  }

  /* Desktop: 3 columns */
  @media (min-width: 1024px) {
    .footer-main {
      grid-template-columns: 1.4fr 1fr 1.4fr;
      gap: 2rem 4rem;
    }
  }

  /* --- Column shared styles --- */
  .footer-col__heading {
    font-family: 'Bebas Neue', Impact, sans-serif; /* site-config: design.fonts.display */
    font-size: 1.1rem;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: #8B5CF6;                           /* site-config: design.colors.primary_purple */
    margin-bottom: 1.25rem;
  }

  /* ---- COLUMN 1: Brand ---- */
  .footer-brand__logo {
    display: inline-flex;
    flex-direction: column;
    text-decoration: none;
    line-height: 1;
    margin-bottom: 1.25rem;
  }

  .footer-brand__title {
    font-family: 'Bebas Neue', Impact, sans-serif; /* site-config: design.fonts.display */
    font-size: 2.25rem;
    letter-spacing: 2px;
    line-height: 1;
    background: linear-gradient(135deg, #8B5CF6 0%, #EC4899 100%); /* site-config: gradient_purple */
    -webkit-background-clip: text;
    background-clip: text;
    -webkit-text-fill-color: transparent;
    color: transparent;
  }

  .footer-brand__sub {
    font-family: 'Outfit', Helvetica Neue, sans-serif; /* site-config: design.fonts.body */
    font-size: 0.75rem;
    font-weight: 400;
    letter-spacing: 0.2em;
    text-transform: lowercase;
    color: #A1A1A1;                           /* site-config: design.colors.text_gray */
    margin-top: 2px;
  }

  .footer-brand__tagline {
    font-size: 0.95rem;
    font-weight: 400;
    color: #A1A1A1;                           /* site-config: design.colors.text_gray */
    line-height: 1.6;
    margin-bottom: 1.75rem;
    max-width: 280px;
  }

  /* Social icons */
  .footer-social {
    display: flex;
    gap: 0.85rem;
    align-items: center;
  }

  .footer-social__link {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    width: 42px;
    height: 42px;
    border-radius: 50%;
    border: 1.5px solid rgba(139, 92, 246, 0.4); /* site-config: primary_purple at 40% */
    color: #A1A1A1;                           /* site-config: text_gray */
    text-decoration: none;
    transition: all 0.3s ease;               /* site-config: design.effects.transition */
    background: transparent;
  }

  .footer-social__link:hover {
    background: linear-gradient(135deg, #8B5CF6 0%, #EC4899 100%); /* site-config: gradient_purple */
    border-color: transparent;
    color: #FFFFFF;
    transform: translateY(-3px);
    box-shadow: 0 8px 20px rgba(139, 92, 246, 0.4);
  }

  .footer-social__link svg {
    width: 18px;
    height: 18px;
    stroke: currentColor;
    fill: none;
    stroke-width: 1.75;
    stroke-linecap: round;
    stroke-linejoin: round;
  }

  /* ---- COLUMN 2: Quick Links ---- */
  .footer-links {
    list-style: none;
    margin: 0;
    padding: 0;
    display: flex;
    flex-direction: column;
    gap: 0.1rem;
  }

  .footer-links__item a {
    display: inline-block;
    font-size: 0.95rem;
    font-weight: 400;
    color: #A1A1A1;                           /* site-config: text_gray */
    text-decoration: none;
    padding: 0.45rem 0;
    transition: color 0.3s ease, padding-left 0.3s ease;
    position: relative;
  }

  .footer-links__item a::before {
    content: '→';
    position: absolute;
    left: -1.2rem;
    opacity: 0;
    color: #8B5CF6;                           /* site-config: primary_purple */
    transition: opacity 0.3s ease, left 0.3s ease;
  }

  .footer-links__item a:hover {
    color: #FFFFFF;                           /* site-config: text_white */
    padding-left: 1.2rem;
  }

  .footer-links__item a:hover::before {
    opacity: 1;
    left: 0;
  }

  /* ---- COLUMN 3: Contact Info ---- */
  .footer-contact {
    display: flex;
    flex-direction: column;
    gap: 1rem;
  }

  .footer-contact__item {
    display: flex;
    gap: 0.85rem;
    align-items: flex-start;
  }

  .footer-contact__icon {
    flex-shrink: 0;
    width: 18px;
    height: 18px;
    margin-top: 2px;
    color: #8B5CF6;                           /* site-config: primary_purple */
  }

  .footer-contact__icon svg {
    width: 18px;
    height: 18px;
    stroke: currentColor;
    fill: none;
    stroke-width: 1.75;
    stroke-linecap: round;
    stroke-linejoin: round;
  }

  .footer-contact__text {
    font-size: 0.9rem;
    color: #A1A1A1;                           /* site-config: text_gray */
    line-height: 1.6;
  }

  .footer-contact__text a {
    color: #A1A1A1;
    text-decoration: none;
    transition: color 0.3s ease;
  }

  .footer-contact__text a:hover {
    color: #8B5CF6;                           /* site-config: primary_purple */
  }

  .footer-contact__text strong {
    display: block;
    color: #FFFFFF;
    font-weight: 600;
    font-size: 0.85rem;
    letter-spacing: 0.05em;
    text-transform: uppercase;
    margin-bottom: 0.2rem;
  }

  /* Hours table */
  .footer-hours {
    font-size: 0.875rem;
    color: #A1A1A1;
    line-height: 1.8;
  }

  .footer-hours span {
    color: #FFFFFF;
    font-weight: 600;
  }

  /* --- Bottom bar --- */
  .footer-bottom {
    border-top: 1px solid rgba(139, 92, 246, 0.15);
    max-width: 1400px;
    margin-inline: auto;
    padding: 1.5rem 5%;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 0.75rem;
    text-align: center;
  }

  @media (min-width: 768px) {
    .footer-bottom {
      flex-direction: row;
      justify-content: space-between;
      text-align: left;
    }
  }

  .footer-bottom__copy {
    font-size: 0.85rem;
    color: #A1A1A1;
  }

  .footer-bottom__links {
    display: flex;
    gap: 1.5rem;
    align-items: center;
    flex-wrap: wrap;
    justify-content: center;
  }

  .footer-bottom__links a {
    font-size: 0.85rem;
    color: #A1A1A1;
    text-decoration: none;
    transition: color 0.3s ease;
  }

  .footer-bottom__links a:hover {
    color: #8B5CF6;
  }

  .footer-bottom__links span {
    color: rgba(139, 92, 246, 0.4);
    font-size: 0.75rem;
  }

  .footer-bottom__tagline {
    font-size: 0.8rem;
    color: rgba(161, 161, 161, 0.6);
    font-style: italic;
  }

  @media (min-width: 768px) {
    .footer-bottom__tagline {
      text-align: right;
    }
  }
</style>

<!-- =====================================================================
     FOOTER HTML
     NAP data populated from site-config.json via JavaScript fetch
     ===================================================================== -->
<footer class="site-footer" role="contentinfo" itemscope itemtype="https://schema.org/LocalBusiness">

  <div class="footer-main">

    <!-- ---- COLUMN 1: Brand + Social ---- -->
    <div class="footer-col footer-col--brand">

      <a href="/" class="footer-brand__logo" aria-label="UNDRGRND Movement — Home">
        <img src="../images/logo/logo-full.webp" alt="UNDRGRND Movement — Gold Coast Movement Space" width="232" height="50" style="height:50px;width:auto;display:block;" loading="lazy">
      </a>

      <!-- Tagline: site-config.json → project.tagline -->
      <p class="footer-brand__tagline" id="footerTagline">
        Foundational movement for body and mind
      </p>

      <!-- Social links: site-config.json → business.contact.instagram / .facebook -->
      <div class="footer-social" aria-label="Social media links">

        <!-- Instagram -->
        <a
          href="#"
          class="footer-social__link"
          id="footerInstagram"
          aria-label="UNDRGRND Movement on Instagram"
          rel="noopener noreferrer"
          target="_blank"
        >
          <!-- Lucide: instagram -->
          <svg aria-hidden="true" viewBox="0 0 24 24">
            <rect x="2" y="2" width="20" height="20" rx="5" ry="5"></rect>
            <path d="M16 11.37A4 4 0 1 1 12.63 8 4 4 0 0 1 16 11.37z"></path>
            <line x1="17.5" y1="6.5" x2="17.51" y2="6.5"></line>
          </svg>
        </a>

        <!-- Facebook -->
        <a
          href="#"
          class="footer-social__link"
          id="footerFacebook"
          aria-label="UNDRGRND Movement on Facebook"
          rel="noopener noreferrer"
          target="_blank"
        >
          <!-- Lucide: facebook -->
          <svg aria-hidden="true" viewBox="0 0 24 24">
            <path d="M18 2h-3a5 5 0 0 0-5 5v3H7v4h3v8h4v-8h3l1-4h-4V7a1 1 0 0 1 1-1h3z"></path>
          </svg>
        </a>

      </div>
    </div>

    <!-- ---- COLUMN 2: Quick Links ---- -->
    <div class="footer-col footer-col--links">
      <h3 class="footer-col__heading">Quick Links</h3>
      <!-- Links populated from site-config.json navigation.main_menu -->
      <ul class="footer-links" id="footerNavLinks" role="list">
        <!-- Populated by JavaScript -->
      </ul>
    </div>

    <!-- ---- COLUMN 3: Contact Info ---- -->
    <!--
      NAP CONSISTENCY: All Name, Address, Phone values are rendered
      directly from site-config.json to match Google My Business exactly.
    -->
    <div class="footer-col footer-col--contact">
      <h3 class="footer-col__heading">Contact Us</h3>

      <address style="font-style: normal;"><span id="footerAddress">UNDRGRND Movement</span></address>
    </div>

  </div><!-- /.footer-main -->

  <!-- ---- Bottom bar ---- -->
  <div class="footer-bottom">

    <p class="footer-bottom__copy">
      <!-- NAP: legal_name from site-config.json business.legal_name -->
      &copy; 2026 <span itemprop="name">UNDRGRND Movement</span>. All rights reserved.
    </p>

    <nav class="footer-bottom__links" aria-label="Legal links">
      <a href="/privacy-policy.html">Privacy Policy</a>
      <span aria-hidden="true">|</span>
      <a href="/terms-of-service.html">Terms of Service</a>
    </nav>

    <p class="footer-bottom__tagline">
      Proudly serving Gold Coast and Southport communities
    </p>

  </div>

</footer>

<!-- =====================================================================
     FOOTER JAVASCRIPT
     Data source: site-config.json → project, business, navigation
     NAP values are pre-rendered in HTML above; JS only updates social
     links and nav items to avoid any NAP inconsistency from async load.
     ===================================================================== -->
<script>
(function () {
  'use strict';

  fetch('/site-config.json')
    .then(function (res) {
      if (!res.ok) throw new Error('Could not load site-config.json');
      return res.json();
    })
    .then(function (config) {

      /* --- Tagline: project.tagline --- */
      var taglineEl = document.getElementById('footerTagline');
      if (taglineEl && config.project && config.project.tagline) {
        taglineEl.textContent = config.project.tagline;
      }

      /* --- Social links: business.contact.instagram / .facebook ---
           URLs are placeholders until client updates site-config.json.
           We only set href if the value is not a placeholder string.
      --- */
      var instagram = config.business && config.business.contact && config.business.contact.instagram;
      var facebook  = config.business && config.business.contact && config.business.contact.facebook;

      var igLink = document.getElementById('footerInstagram');
      if (igLink && instagram && instagram.indexOf('PLACEHOLDER') === -1) {
        igLink.href = instagram;
      }

      var fbLink = document.getElementById('footerFacebook');
      if (fbLink && facebook && facebook.indexOf('PLACEHOLDER') === -1) {
        fbLink.href = facebook;
      }

      /* --- NAP: Address --- */
      var addressEl = document.getElementById('footerAddress');
      if (addressEl && config.business && config.business.address) {
        var addr = config.business.address;
        addressEl.innerHTML =
          addr.street + '<br>' +
          addr.suburb + ' ' + addr.state + ' ' + addr.postcode + '<br>' +
          addr.country;
      }

      /* --- NAP: Email --- */
      var emailEl = document.getElementById('footerEmail');
      if (emailEl && config.business && config.business.contact && config.business.contact.email) {
        var email = config.business.contact.email;
        emailEl.href = 'mailto:' + email;
        emailEl.textContent = email;
      }

      /* --- NAP: Phone --- */
      var phoneEl = document.getElementById('footerPhone');
      if (phoneEl && config.business && config.business.contact && config.business.contact.phone) {
        var phone = config.business.contact.phone;
        if (phone.indexOf('PLACEHOLDER') === -1) {
          phoneEl.href = 'tel:' + phone.replace(/\s/g, '');
          phoneEl.textContent = phone;
        }
      }

      /* --- Quick links: navigation.main_menu --- */
      var navList = document.getElementById('footerNavLinks');
      if (navList && config.navigation && config.navigation.main_menu) {
        config.navigation.main_menu.forEach(function (item) {
          var li = document.createElement('li');
          li.className = 'footer-links__item';

          var a = document.createElement('a');
          a.href = item.href;
          a.textContent = item.label;

          li.appendChild(a);
          navList.appendChild(li);
        });
      }

    })
    .catch(function (err) {
      console.error('Footer: Failed to load site-config.json', err);

      /* Fallback: render static nav links from site-config.json values */
      var fallbackLinks = [
        { label: 'Home',      href: '/' },
        { label: 'Adults',    href: '/adults.html' },
        { label: 'Kids',      href: '/kids.html' },
        { label: 'Timetable', href: '/timetable.html' },
        { label: 'About',     href: '/about.html' },
        { label: 'Learn',    href: '/learn.html' },
        { label: 'Contact',   href: '/contact.html' }
      ];

      var navList = document.getElementById('footerNavLinks');
      if (navList) {
        fallbackLinks.forEach(function (item) {
          var li = document.createElement('li');
          li.className = 'footer-links__item';
          var a = document.createElement('a');
          a.href = item.href;
          a.textContent = item.label;
          li.appendChild(a);
          navList.appendChild(li);
        });
      }
    });

}());
</script>
